name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Typecheck + Lint + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sifen
          POSTGRES_PASSWORD: sifen123
          POSTGRES_DB: sifen_api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://sifen:sifen123@localhost:5432/sifen_api_test
      REDIS_URL: redis://localhost:6379
      SIFEN_AMBIENTE: test
      SIFEN_CERT_PATH: /dev/null
      SIFEN_CERT_PASS: placeholder
      API_KEY_SECRET: ci-secret-32-chars-minimum-placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Migrar DB de test
        run: pnpm prisma migrate deploy

      - name: Tests unitarios + integración
        run: pnpm test:coverage

      - name: Subir coverage a Codecov
        uses: codecov/codecov-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build imagen
        run: docker build -f docker/Dockerfile -t sifen-api:ci .

      - name: Verificar que la imagen arranca
        run: |
          docker run --rm \
            -e NODE_ENV=production \
            -e SIFEN_AMBIENTE=test \
            -e SIFEN_CERT_PATH=/dev/null \
            -e SIFEN_CERT_PASS=test \
            -e DATABASE_URL=postgresql://x:x@x:5432/x \
            -e API_KEY_SECRET=test-secret-32-chars-minimum-plhd \
            sifen-api:ci node --version
